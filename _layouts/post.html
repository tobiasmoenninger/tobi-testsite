---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="{{ '/blog/' | relative_url }}" class="back-link">← All posts</a>
</article>
